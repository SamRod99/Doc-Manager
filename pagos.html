<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/globales.css">
    <link rel="stylesheet" href="css/pagos.css">
    <title>DocManager - Pagos</title>
</head>
<body data-title="Pagos">

    <div id="sidebar-container"></div>

    <div class="layout">
        <div id="header-container"></div>

        <main>

            <!-- VISTA: Reporte -->
            <div id="vista-reporte" class="list-card">

                <div class="list-toolbar">
                    <h2 class="form-title">Reporte de Ingresos</h2>
                    <button class="btn-nuevo" id="btn-abrir-form">+ Registrar Pago</button>
                </div>

                <!-- Tarjetas resumen -->
                <div class="pagos-grid">
                    <div class="pago-card" style="background: var(--teal-mint);">
                        <span>Total Ingresos</span>
                        <strong>$1,550.00</strong>
                    </div>
                    <div class="pago-card" style="background: var(--teal-dark);">
                        <span>Efectivo</span>
                        <strong>$550.00</strong>
                    </div>
                    <div class="pago-card" style="background: #1a2628;">
                        <span>Tarjeta</span>
                        <strong>$500.00</strong>
                    </div>
                    <div class="pago-card" style="background: var(--orange);">
                        <span>Transferencia</span>
                        <strong>$500.00</strong>
                    </div>
                </div>

                <!-- Tabla -->
                <table>
                    <thead>
                        <tr>
                            <th>ID Pago</th>
                            <th>Cita</th>
                            <th>Método</th>
                            <th>Costo</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1203</td><td>1</td>
                            <td>Transferencia</td>
                            <td>$500</td><td>$500</td>
                        </tr>
                        <tr>
                            <td>1204</td><td>2</td>
                            <td>Efectivo</td>
                            <td>$250</td><td>$250</td>
                        </tr>
                        <tr>
                            <td>1205</td><td>3</td>
                            <td>Efectivo</td>
                            <td>$300</td><td>$300</td>
                        </tr>
                        <tr>
                            <td>1206</td><td>4</td>
                            <td>Tarjeta</td>
                            <td>$500</td><td>$500</td>
                        </tr>
                    </tbody>
                </table>

            </div>

            <!-- VISTA: Formulario -->
            <form id="vista-form" class="form-card" style="display:none;">
                <div class="form-header">
                    <button type="button" class="btn-volver" id="btn-volver">
                        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                        Volver
                    </button>
                    <h2 class="form-title">Registrar Pago</h2>
                </div>

                <div class="form-col">

                    <!-- Método de pago -->
                    <div class="field-group">
                        <label>Método de Pago</label>
                        <div class="metodo-tabs">
                            <button type="button" class="metodo-tab" data-metodo="Efectivo">Efectivo</button>
                            <button type="button" class="metodo-tab active" data-metodo="Tarjeta">Tarjeta</button>
                            <button type="button" class="metodo-tab" data-metodo="Transferencia">Transferencia</button>
                        </div>
                        <input type="hidden" name="metodo" id="metodo" value="Tarjeta">
                    </div>

                    <div class="field-group">
                        <label for="cita">Cita vinculada</label>
                        <select name="cita" id="cita">
                            <option>Cita #1 — Juan Perez</option>
                            <option>Cita #2 — Jose Ortega</option>
                            <option>Cita #3 — Miguel Camacho</option>
                            <option selected>Cita #4 — Aldo Moran</option>
                        </select>
                    </div>

                    <div class="field-group">
                        <label for="costo">Costo</label>
                        <input type="text" name="costo" id="costo" placeholder="$0.00">
                    </div>

                    <div class="field-group">
                        <label for="total">Total a cobrar</label>
                        <input type="text" name="total" id="total" placeholder="$0.00">
                    </div>

                </div>

                <div class="form-actions">
                    <button type="submit">Registrar Pago</button>
                </div>
            </form>

        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/header.js"></script>
    <script src="js/pagos.js"></script>
</body>
</html>
