<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/globales.css">
    <link rel="stylesheet" href="css/citas.css">
    <link rel="stylesheet" href="css/pacientes.css">
    <title>DocManager - Citas</title>
</head>
<body data-title="Citas">
    
    <aside id="sidebar-container"></aside><!--menu lateral-->


    <div class="layout">
        <div id="header-container"></div>
        
        <main>
            <div class="list-card" id="vista-lista">
                <div class="list-toolbar">
                    <div class="tabs">
                        <button class="tab" data-filter="todas">Todas</button>
                        <button class="tab" data-filter="programada">Programadas</button>
                        <button class="tab" data-filter="atendida">Atendidas</button>
                        <button class="tab" data-filter="cancelada">Canceladas</button>
                    </div>
                    <button class="btn-nuevo" id="btn-abrir-form">Nueva cita</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Fecha</th>
                            <th>Paciente</th>
                            <th>Motivo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>100</td><td>27/04/2026</td><td>Juan Perez</td><td>Lele pancha</td><td>Pendiente</td>
                            <td><button class="btn-ver">Ver</button></td>
                        </tr>
                        <tr>
                            <td>101</td><td>Aldo</td><td>Perez</td><td>32</td><td>O+</td>
                            <td><button class="btn-ver">Ver</button></td>
                        </tr>
                        <tr>
                            <td>102</td><td>Miguel</td><td>Perez</td><td>32</td><td>O+</td>
                            <td><button class="btn-ver">Ver</button></td>
                        </tr>
                        <tr>
                            <td>103</td><td>Samuel</td><td>Perez</td><td>32</td><td>O+</td>
                            <td><button class="btn-ver">Ver</button></td>
                        </tr>
                    </tbody>
                </table>

            </div><!--lista-card-->
            
            <form class="form-card" style="display: none;" id="vista-form">
                <div class="form-header">
                    <button type="button" class="btn-volver" id="btn-volver">
                        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                        Volver
                    </button>
                    <h2 class="form-title">Nueva Cita</h2>
                </div>

                <div class="form-col">
                    <div class="field-group">
                        <label for="paciente">Paciente</label>
                        <select name="paciente" id="paciente">
                            <option value="Samuel Garcia (ID: 101)"></option>
                            <option value="Samuel Garcia (ID: 101)"></option>
                            <option value="Samuel Garcia (ID: 101)"></option>
                            <option value="Samuel Garcia (ID: 101)"></option>
                        </select>
                    </div>
                    <div class="form-grid-2">
                        <div class="field-group">
                            <label for="fecha">Fecha</label>
                            <input type="date" name="fecha" id="fecha">
                        </div>
                        <div class="field-group">
                            <label for="hora">Hora</label>
                            <input type="time" name="hora" id="hora">
                        </div>
                    </div><!--form-grid-2-->
                    <div class="field-group">
                        <label for="motivo">Motivo de consulta</label>
                        <input type="text" name="motivo" id="motivo" placeholder="Describa el motivo de la consulta">
                    </div>
                </div><!--form col-->
                <div class="form-actions">
                    <button type="button">Confirmar Cita</button>
                </div>
            </form><!--form card-->
        </main>
    </div><!--header-->

    <script src="js/header.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/citas.js"></script>

</body>
</html>
