<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DocManager – Inicio de Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/index.css">
</head>


<body>

  <!-- NAV -->
  <nav>
    <div class="brand">
      <div>
        <span class="brand-name">DocManager</span>
        <span class="brand-sub">Consultorio Médico</span>
      </div>
    </div>
  </nav>
  
  <main>
    <div class="card">
        <div class="card-header">
            <div class="card-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.67 0 8 1.34 8 4v2H4v-2c0-2.66 5.33-4 8-4z"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <h1>DocManager</h1>
            <p>Sistema de gestión médica</p>
        </div><!--card-header-->
        
        <div class="card-body">
            <div class="error-msg" id="errorMsg">
                ⚠ Usuario o contraseña incorrectos. Intenta de nuevo.
             </div>

            <div class="field">
              <label for="usuario">Usuario</label>
              <div class="input-wrap">
                    <input type="text" id="usuario" placeholder="Ingresa un usuario" autocomplete="username"/>
                    <svg viewBox="0 0 24 24" style="left:13px;pointer-events:none;position:absolute;top:50%;transform:translateY(-50%)">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
              </div>
            </div><!--field-->

            <div class="field">
              <label for="contrasena">Contraseña</label>
              <div class="input-wrap">
                    <input type="password" id="contrasena" placeholder="••••••••" autocomplete="current-password"/>
                    <svg viewBox="0 0 24 24" style="left:13px;pointer-events:none;position:absolute;top:50%;transform:translateY(-50%)">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <!-- ver password -->
                    <span class="toggle-pw" id="togglePw" onclick="togglePassword()">
                        <svg id="eyeIcon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="var(--text-muted)" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </span>
              </div>
            </div><!--field password-->

            <div class="row">
                <label class="checkbox-label">
                    <input type="checkbox" id="remember"/>
                    <span class="custom-check">
                        <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
                    </span>
                    Recordarme
                </label>
              <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
            </div><!--row-->
            <button class="btn-login" href="dashboard.html">Iniciar sesión</button>
        </div><!--card login / body-->
        <!-- FOOTER -->
        <div class="card-footer">
            <span>© 2025 DocManager · Todos los derechos reservados</span>
        </div>
    </div><!--card-->
  </main><!--main-->
</body>
</html>
