<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/globales.css">
    <link rel="stylesheet" href="css/pacientes.css">
    <title>DocManager - Pacientes</title>
   
</head>
<body data-title="Pacientes">
    
    <aside id="sidebar-container"></aside><!--menu lateral-->
    
    <div class="layout">
        <div id="header-container"></div>

        <main>

            <div id="vista-lista" class="list-card">
                <div class="list-toolbar">
                    <div class="search-wrapper">
                        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="search" placeholder="Buscar paciente por nombre...">
                    </div><!--search-wrapper-->
                    <button class="btn-nuevo" id="btn-abrir-form">Nuevo</button>
                </div><!--list-toolbar-->

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellidos</th>
                            <th>Edad</th>
                            <th>Tipo de sangre</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>100</td><td>Juan</td><td>Perez</td><td>32</td><td>O+</td>
                            <td><button class="btn-ver">Ver</button></td>
                        </tr>
                        <tr>
                            <td>101</td><td>Aldo</td><td>Perez</td><td>32</td><td>O+</td>
                            <td><button class="btn-ver">Ver</button></td>
                        </tr>
                        <tr>
                            <td>102</td><td>Miguel</td><td>Perez</td><td>32</td><td>O+</td>
                            <td><button class="btn-ver">Ver</button></td>
                        </tr>
                        <tr>
                            <td>103</td><td>Samuel</td><td>Perez</td><td>32</td><td>O+</td>
                            <td><button class="btn-ver">Ver</button></td>
                        </tr>
                    </tbody>
                </table>
            </div><!--list-card-->
            
            <form id="vista-form" class="form-card" style="display: none;">
                <div class="form-header">
                    <button type="button" class="btn-volver" id="btn-volver">
                        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                        Volver
                    </button>
                    <h2 class="form-title">Nuevo Paciente</h2>
                </div>
                
                <div class="form-grid">
                    <div class="field-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" name="nombre" id="nombre">
                    </div>

                    <div class="field-group">
                      <label for="apellido">Apellido</label>
                      <input type="text" name="apellido" id="apellido">
                    </div>

                    <div class="field-group">
                      <label for="edad">Edad</label>
                      <input type="number" name="edad" id="edad">
                    </div>
                
                    <div class="field-group">
                      <label for="celular">Teléfono</label>
                      <input type="tel" name="celular" id="celular">
                    </div>
                
                    <div class="field-group">
                      <label for="direccion">Dirección</label>
                      <input type="text" name="direccion" id="direccion">
                    </div>
                
                    <div class="field-group">
                      <label for="contacto">Contacto Emerg.</label>
                      <input type="text" name="contacto" id="contacto">
                    </div>

                </div>

                <div class="form-actions">
                   <button type="submit">Guardar Paciente</button>
                </div>
            </form>
        </main>

    </div><!--header-->

    <script src="js/sidebar.js"></script>
    <script src="js/header.js"></script>
    <script src="js/pacientes.js"></script>

</body>
</html>
